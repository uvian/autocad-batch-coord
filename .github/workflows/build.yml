name: Build AutoCAD Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore BatchCoord.sln

    - name: Build
      run: dotnet build BatchCoord.sln -c Release --no-restore

    - name: Create bundle package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bundle\BatchCoord.bundle\Contents
        Copy-Item src\BatchCoord\bin\Release\net472\BatchCoord.dll bundle\BatchCoord.bundle\Contents\
        Copy-Item PackageContents.xml bundle\BatchCoord.bundle\
        Compress-Archive -Path bundle\* -DestinationPath bundle\BatchCoord.bundle.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BatchCoord
        path: |
          src/BatchCoord/bin/Release/net472/BatchCoord.dll
          bundle/BatchCoord.bundle.zip

    - name: Upload to Release (tagged only)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        echo "Uploading to release: ${{ github.ref_name }} ..."
        # 删除残留的 Release（如 tag 被 force-push 过），忽略错误
        gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes 2>$null
        # 全新创建 Release 并上传构件
        gh release create "${{ github.ref_name }}" `
          "src/BatchCoord/bin/Release/net472/BatchCoord.dll" `
          "bundle/BatchCoord.bundle.zip" `
          --repo "${{ github.repository }}" `
          --generate-notes `
          --target "${{ github.sha }}"
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Release 创建失败，退出码: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        echo "release done"
